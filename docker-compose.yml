services:
  api:
    build: .
    container_name: payment-api

    ports:
      - '3000:3000'

    volumes:
      - .:/app
      - /app/node_modules

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    container_name: payment-postgres

    restart: always

    ports:
      - '5432:5432'

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: payment-redis

    restart: always

    ports:
      - '6379:6379'

    volumes:
      - redis_data:/data

  worker:
    build: .

    command: npm run worker

    volumes:
      - .:/app
      - /app/node_modules

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
